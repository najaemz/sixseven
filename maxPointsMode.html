<!DOCTYPE html>
<html>
<head>
  <title>Max Points Mode</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="sixseven.css">
</head>

<body>
    <div class="titulo">
        <p>MAX POINTS MODE</p>
    </div>

    <div class="sequence-counter">
        <p class="js-score">Score: 0</p>
    </div>

    <div class="show-sequence"></div>

    <div class="typed-answer">
        <input type="number" class="js-input">
    </div>

    <div class="show-answer">
        <button class="js-submit">Submit</button>
    </div>

    <div class="js-feedback"></div>

    <dialog class="js-gameOver">
        <h2>Game Over</h2>
        <p class="js-final-score"></p>
        <button class="js-restart">Restart</button>
    </dialog>

    <div class="go-back">
        <a href="sixseven.html">go back</a>
    </div>

    <script src="maxPointsMode.js"></script>
</body>
</html>
