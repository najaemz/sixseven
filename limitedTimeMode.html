<!DOCTYPE html>
<html>
<head>
  <title>Limited Time Mode</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="sixseven.css">
</head>

<body>
    <div class="titulo">
        <p>LIMITED TIME MODE</p>
    </div>

    <div class="sequence-counter">
        <p class="js-score">Score: 0</p>
    </div>

    <div class="js-timer" style="font-size: 20px; font-weight: bold; color: #d9534f; margin-bottom: 10px;"></div>

    <div class="show-sequence"></div>

    <div class="answers js-answers"></div>

    <div class="js-feedback"></div>

    <div style="clear:both"> </div>

    <dialog class="gameOver js-gameOver">
        <h2>Game Over</h2>
        <p class="js-final-score"></p>
        <button class="restart js-restart">Restart</button>
    </dialog>

    <div class="go-back">
        <a href="sixseven.html"> go back </a>
    </div>

    <script src="limitedTimeMode.js"></script>
</body>
</html>
