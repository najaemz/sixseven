<!DOCTYPE html>
<html>
<head>
  <title>Story Mode</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="sixseven.css">
</head>

<body>
    <div class="titulo">
        <p>STORY MODE</p>
    </div>

    <div class="sequence-counter">
        <p class="js-counter"></p>
    </div>

    <div class="show-sequence"></div>

    <div class="typed-answer">
        <input type="number" class="js-input">
    </div>

    <div class="show-answer">
        <button class="js-submit">Submit</button>
    </div>

    <div class="js-feedback"></div>

    <div class="show-sequence-explanation">
        <button class="js-explain">Show Explanation</button>
    </div>

    <div class="js-explanation-text"></div>

    <div class="next-sequence">
        <button class="js-next" style="display:none;">Next</button>
    </div>

    <div class="go-back">
        <a href="index.html">go back</a>
    </div>

    <script src="storyMode.js"></script>
</body>
</html>
